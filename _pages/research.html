---
layout: archive
title: "Research"
permalink: /research/
author_profile: true
---

{% include base_path %}

<style>
.research-card {
  display: flex;
  gap: 28px;
  align-items: center;
  margin: 35px 0;
  padding-bottom: 30px;
  border-bottom: 1px solid #ddd;
}

.research-card img {
  width: 36%;
  max-width: 330px;
  border-radius: 6px;
}

.research-card-text {
  flex: 1;
}

.research-card-text h2 {
  margin-top: 0;
  font-size: 24px;
}

.research-card-text p {
  font-size: 16px;
  line-height: 1.6;
}

@media (max-width: 768px) {
  .research-card {
    flex-direction: column;
    align-items: flex-start;
  }

  .research-card img {
    width: 100%;
    max-width: 100%;
  }
}
</style>

{% for post in site.research %}
<div class="research-card">

  {% if post.header.teaser %}
    <img src="{{ post.header.teaser | relative_url }}" alt="{{ post.title }}">
  {% elsif post.image %}
    <img src="{{ post.image | relative_url }}" alt="{{ post.title }}">
  {% endif %}

  <div class="research-card-text">
    <h2>{{ post.title }}</h2>
    <p>{{ post.excerpt | strip_html }}</p>
  </div>

</div>
{% endfor %}
